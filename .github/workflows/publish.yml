name: NeoForge 26.1 Build and Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 設定全域環境變數解決 Node.js 20 棄用問題
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          # 由於日誌顯示 GitHub Cache 服務不穩定，這裡保留 cache 設定
          # 如果持續失敗，這是 GitHub 伺服器的問題，非腳本錯誤
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # 增加此設定：如果快取寫入失敗（伺服器問題），不中斷建置流程
          cache-overwrite-existing: false
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        # 確保使用專案內的 Gradle Wrapper (日誌顯示為 9.2.1)
        run: ./gradlew build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: neoforge-mod-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Extract Release Version
        id: check_release
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" =~ " | release: " ]]; then
            VERSION=$(echo "$COMMIT_MSG" | sed -n 's/.* | release: \(.*\)/\1/p' | xargs)
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        if: steps.check_release.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check_release.outputs.version }}
          name: "[MC 26.1] Release ${{ steps.check_release.outputs.version }}"
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}